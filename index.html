<!doctype html>
<html lang="ko">
<head>
<meta charset="utf-8">
<meta name="viewport" content="width=device-width,initial-scale=1,viewport-fit=cover">
<meta name="apple-mobile-web-app-capable" content="yes">
<meta name="theme-color" content="#1E6B45">
</head>
<body>
<title>BIM밀버디</title>
<style>
:root{
  --bg:#EFF3EC; --surface:#FFFFFF; --surface2:#F6F9F4;
  --ink:#17251C; --muted:#5A6E5F; --faint:#86998B;
  --line:#DBE4D8; --line2:#E9F0E6;
  --green:#1B6B44; --green-deep:#0F4A2E; --green-soft:#E3EFE6; --green-ink:#FFFFFF;
  --gold:#96701A; --gold-soft:#F5ECD3; --gold-hi:#C9A24B;
  --flag:#B8452F; --flag-soft:#F8E7E1;
  --maybe:#86691C; --maybe-soft:#F3ECD1;
  --hero-a:#27835A; --hero-b:#155C3B; --hero-c:#0A3A23;
  --nav-bg:rgba(255,255,255,.93);
  --ring-soft:rgba(15,74,46,.13);
  --shadow:0 1px 2px rgba(15,58,37,.05),0 10px 28px -16px rgba(15,58,37,.22);
  --radius:16px;
}
@media (prefers-color-scheme: dark){
  :root{
    --bg:#0C1510; --surface:#141F18; --surface2:#19271E;
    --ink:#E6EFE7; --muted:#9DB1A2; --faint:#6D8273;
    --line:#25362B; --line2:#1E2C22;
    --green:#4CAE79; --green-deep:#2F7E53; --green-soft:#1C3325; --green-ink:#0B1710;
    --gold:#D8AC52; --gold-soft:#322909; --gold-hi:#E4C377;
    --flag:#E06B4E; --flag-soft:#3A1D14;
    --maybe:#D3B54C; --maybe-soft:#332B0F;
    --hero-a:#1F6A45; --hero-b:#124630; --hero-c:#07271A;
    --nav-bg:rgba(15,25,19,.92);
    --ring-soft:rgba(255,255,255,.09);
    --shadow:0 1px 2px rgba(0,0,0,.45),0 12px 32px -16px rgba(0,0,0,.6);
  }
}
:root[data-theme="dark"]{
  --bg:#0C1510; --surface:#141F18; --surface2:#19271E;
  --ink:#E6EFE7; --muted:#9DB1A2; --faint:#6D8273;
  --line:#25362B; --line2:#1E2C22;
  --green:#4CAE79; --green-deep:#2F7E53; --green-soft:#1C3325; --green-ink:#0B1710;
  --gold:#D8AC52; --gold-soft:#322909; --gold-hi:#E4C377;
  --flag:#E06B4E; --flag-soft:#3A1D14;
  --maybe:#D3B54C; --maybe-soft:#332B0F;
  --hero-a:#1F6A45; --hero-b:#124630; --hero-c:#07271A;
  --nav-bg:rgba(15,25,19,.92);
  --ring-soft:rgba(255,255,255,.09);
  --shadow:0 1px 2px rgba(0,0,0,.45),0 12px 32px -16px rgba(0,0,0,.6);
}
:root[data-theme="light"]{
  --bg:#EFF3EC; --surface:#FFFFFF; --surface2:#F6F9F4;
  --ink:#17251C; --muted:#5A6E5F; --faint:#86998B;
  --line:#DBE4D8; --line2:#E9F0E6;
  --green:#1B6B44; --green-deep:#0F4A2E; --green-soft:#E3EFE6; --green-ink:#FFFFFF;
  --gold:#96701A; --gold-soft:#F5ECD3; --gold-hi:#C9A24B;
  --flag:#B8452F; --flag-soft:#F8E7E1;
  --maybe:#86691C; --maybe-soft:#F3ECD1;
  --hero-a:#27835A; --hero-b:#155C3B; --hero-c:#0A3A23;
  --nav-bg:rgba(255,255,255,.93);
  --ring-soft:rgba(15,74,46,.13);
  --shadow:0 1px 2px rgba(15,58,37,.05),0 10px 28px -16px rgba(15,58,37,.22);
}
*{box-sizing:border-box;margin:0;padding:0}
html,body{background:var(--bg)}
body{
  font-family:"Apple SD Gothic Neo","Pretendard","Noto Sans KR","Malgun Gothic",system-ui,sans-serif;
  color:var(--ink); font-size:15px; line-height:1.55;
  -webkit-font-smoothing:antialiased;
}
button{font-family:inherit;cursor:pointer;border:none;background:none;color:inherit}
button svg,a svg{pointer-events:none}
input,textarea,select{
  font-family:inherit;font-size:15px;color:var(--ink);
  background:var(--surface2);border:1px solid var(--line);border-radius:11px;
  padding:11px 13px;width:100%;min-height:46px;
}
input[type="checkbox"]{width:auto;min-height:0;accent-color:var(--green)}
input:focus,textarea:focus,select:focus{outline:2px solid var(--green);outline-offset:0;border-color:transparent}
textarea{resize:vertical;min-height:76px}
label{display:block;font-size:11.5px;font-weight:800;color:var(--muted);letter-spacing:.06em;margin:14px 0 6px}
label:first-child{margin-top:0}
a{color:var(--green)}
.num{font-variant-numeric:tabular-nums}

#app{max-width:520px;margin:0 auto;min-height:100vh;padding-bottom:calc(84px + env(safe-area-inset-bottom))}

/* ---------- top bar ---------- */
.topbar{
  position:sticky;top:0;z-index:30;background:var(--bg);
  display:flex;align-items:center;gap:11px;
  padding:14px 18px 10px;
}
.topbar .mark{
  width:40px;height:40px;border-radius:13px;flex:none;
  background:linear-gradient(150deg,var(--hero-a),var(--hero-c));color:#fff;
  display:flex;align-items:center;justify-content:center;
  box-shadow:inset 0 1px 0 rgba(255,255,255,.28),0 5px 12px -5px rgba(10,58,35,.55);
}
.topbar .tt{flex:1;min-width:0}
.topbar .name{font-size:17.5px;font-weight:800;letter-spacing:-.02em;white-space:nowrap;overflow:hidden;text-overflow:ellipsis}
.topbar .sub{font-size:9.5px;color:var(--gold);letter-spacing:.24em;font-weight:800}
.topbar .theme-btn{width:40px;height:40px;border-radius:13px;border:1px solid var(--line);display:flex;align-items:center;justify-content:center;color:var(--muted);flex:none;background:var(--surface);box-shadow:var(--shadow)}
.topbar .theme-btn:focus-visible{outline:2px solid var(--green);outline-offset:2px}

/* ---------- sections / cards ---------- */
main{padding:2px 16px 28px}
.view{display:none}
.view.on{display:block}
.card{background:var(--surface);border:1px solid var(--line);border-radius:var(--radius);box-shadow:var(--shadow);margin-bottom:14px;overflow:hidden}
.card .pad{padding:16px}
.sec-head{display:flex;align-items:baseline;justify-content:space-between;margin:22px 2px 10px}
.sec-head h2{font-size:15px;font-weight:800;letter-spacing:-.02em}
.sec-head .cnt{font-size:12px;color:var(--faint);font-weight:700;margin-left:6px}
.sec-head button{font-size:13px;font-weight:800;color:var(--green);padding:4px 2px}
.eyebrow{font-size:10px;font-weight:800;letter-spacing:.22em;color:var(--gold);margin-bottom:6px}
.empty{padding:34px 16px;text-align:center;color:var(--faint);font-size:13.5px;line-height:1.7}
.empty b{color:var(--muted)}

/* hero (home) — 멤버십 카드 */
.hero{
  background:linear-gradient(158deg,var(--hero-a) 0%,var(--hero-b) 52%,var(--hero-c) 100%);
  color:#fff;border:none;border-radius:20px;
  box-shadow:0 16px 36px -18px rgba(7,42,26,.6),inset 0 1px 0 rgba(255,255,255,.16);
  padding:22px 20px 20px;margin-bottom:14px;position:relative;overflow:hidden;
}
.hero::before{
  content:"";position:absolute;inset:0;pointer-events:none;
  background:repeating-linear-gradient(115deg,rgba(255,255,255,.05) 0 26px,rgba(255,255,255,0) 26px 52px);
}
.hero::after{
  content:"";position:absolute;right:-56px;top:-64px;width:230px;height:230px;border-radius:50%;pointer-events:none;
  background:radial-gradient(circle,rgba(255,255,255,.15),transparent 64%);
}
.hero>*{position:relative;z-index:1}
.hero .hy{font-size:10px;font-weight:800;letter-spacing:.28em;color:var(--gold-hi);margin-bottom:10px}
.hero .hy::after{content:"";display:block;width:26px;height:2px;border-radius:2px;background:var(--gold-hi);opacity:.85;margin-top:8px}
.hero .dday{font-size:42px;font-weight:900;letter-spacing:-.035em;line-height:1.02;text-shadow:0 2px 16px rgba(0,0,0,.2)}
.hero .ev{margin-top:11px;font-size:15px;font-weight:700;letter-spacing:-.01em}
.hero .meta{margin-top:3px;font-size:12.5px;color:rgba(255,255,255,.74)}
.hero .rsvp-line{margin-top:14px;display:flex;gap:7px}
.hero .rsvp-line span{background:rgba(255,255,255,.12);border:1px solid rgba(255,255,255,.22);border-radius:999px;padding:5px 12px;font-size:12px;font-weight:700}
.hero.none .dday{font-size:19px;font-weight:800;text-shadow:none;letter-spacing:-.01em}
.hero button.go{margin-top:15px;background:#fff;color:var(--hero-c);font-weight:800;font-size:13.5px;padding:12px 19px;min-height:44px;border-radius:999px;box-shadow:0 7px 18px -7px rgba(0,0,0,.4)}
.hero button.go:focus-visible{outline:2px solid #fff;outline-offset:3px}

.stats{display:grid;grid-template-columns:repeat(3,1fr);gap:10px;margin-bottom:14px}
.stat{background:var(--surface);border:1px solid var(--line);border-radius:14px;padding:14px 8px 12px;text-align:center;box-shadow:var(--shadow)}
.stat .v{font-size:22px;font-weight:900;letter-spacing:-.03em;line-height:1.15}
.stat .k{font-size:10.5px;color:var(--faint);font-weight:800;letter-spacing:.08em;margin-top:4px}

/* notice */
.notice-row{display:flex;gap:10px;padding:13px 16px;border-top:1px solid var(--line2);align-items:flex-start}
.notice-row:first-child{border-top:none}
.notice-row .flagdot{width:7px;height:7px;border-radius:50%;background:var(--flag);box-shadow:0 0 0 3px var(--flag-soft);margin-top:7px;flex:none}
.notice-row .tx{flex:1;font-size:13.5px;white-space:pre-wrap}
.notice-row .dt{font-size:11px;color:var(--faint);margin-top:3px;letter-spacing:.02em}
.notice-row .del{color:var(--faint);font-size:17px;width:32px;height:32px;display:flex;align-items:center;justify-content:center;border-radius:9px;margin:-5px -8px 0 0;line-height:1}
.notice-row .del:focus-visible{outline:2px solid var(--green);outline-offset:-2px}

/* ---------- events ---------- */
.ev-row{display:flex;gap:13px;padding:14px 16px;min-height:64px;border-top:1px solid var(--line2);align-items:center;width:100%;text-align:left}
.ev-row:first-child{border-top:none}
.datebox{width:54px;flex:none;text-align:center;border-radius:13px;padding:8px 0 7px;background:var(--green-soft);color:var(--green);box-shadow:inset 0 0 0 1px var(--ring-soft)}
.datebox .m{font-size:9.5px;font-weight:800;letter-spacing:.14em}
.datebox .d{font-size:20px;font-weight:900;line-height:1.1;letter-spacing:-.02em}
.ev-row.past .datebox{background:var(--surface2);color:var(--faint);box-shadow:inset 0 0 0 1px var(--line2)}
.ev-row .bd{flex:1;min-width:0}
.ev-row .t{font-weight:800;font-size:14.5px;letter-spacing:-.01em;white-space:nowrap;overflow:hidden;text-overflow:ellipsis}
.ev-row .m2{font-size:12.5px;color:var(--muted);margin-top:1px;white-space:nowrap;overflow:hidden;text-overflow:ellipsis}
.ev-row .badges{display:flex;gap:5px;margin-top:6px;flex-wrap:wrap}
.pill{font-size:11px;font-weight:800;border-radius:6px;padding:2.5px 7px;letter-spacing:.01em}
.pill.g{background:var(--green-soft);color:var(--green)}
.pill.y{background:var(--maybe-soft);color:var(--maybe)}
.pill.r{background:var(--flag-soft);color:var(--flag)}
.pill.gold{background:var(--gold-soft);color:var(--gold)}
.chev{color:var(--faint);flex:none}

/* ---------- members ---------- */
.mem-row{display:flex;gap:13px;padding:13px 16px;min-height:64px;border-top:1px solid var(--line2);align-items:center;width:100%;text-align:left}
.mem-row:first-child{border-top:none}
.avatar{width:44px;height:44px;border-radius:50%;flex:none;display:flex;align-items:center;justify-content:center;font-weight:800;font-size:15px;background:var(--green-soft);color:var(--green);box-shadow:inset 0 0 0 1.5px var(--ring-soft)}
.mem-row .bd{flex:1;min-width:0}
.mem-row .nm{font-weight:800;font-size:14.5px;letter-spacing:-.01em}
.mem-row .nm .role{font-size:11px;font-weight:800;color:var(--gold);letter-spacing:.02em;margin-left:6px}
.mem-row .m2{font-size:12px;color:var(--muted);margin-top:2px}
.searchbar{position:relative;margin-bottom:12px}
.searchbar input{padding-left:38px;background:var(--surface);box-shadow:var(--shadow);border-radius:13px}
.searchbar svg{position:absolute;left:13px;top:15px;color:var(--faint)}

/* ---------- rules ---------- */
.rule{padding:16px;border-top:1px solid var(--line2)}
.rule:first-child{border-top:none}
.rule h3{font-size:14px;font-weight:800;margin-bottom:5px;color:var(--green);letter-spacing:-.01em}
.rule p{font-size:13.5px;white-space:pre-wrap}
.draftband{background:var(--gold-soft);color:var(--gold);border:1px solid var(--ring-soft);font-size:12.5px;font-weight:700;padding:11px 14px;border-radius:12px;margin-bottom:12px;line-height:1.5}

/* ---------- more ---------- */
.menu-row{display:flex;align-items:center;gap:12px;width:100%;text-align:left;padding:14px 16px;min-height:60px;border-top:1px solid var(--line2);font-size:14.5px;font-weight:700;letter-spacing:-.01em}
.menu-row:first-child{border-top:none}
.menu-row .ic{width:36px;height:36px;border-radius:11px;background:var(--green-soft);color:var(--green);display:flex;align-items:center;justify-content:center;flex:none;box-shadow:inset 0 0 0 1px var(--ring-soft)}
.menu-row .sub{display:block;font-size:12px;color:var(--faint);font-weight:500;letter-spacing:0;margin-top:1px}
.menu-row .bd{flex:1}
.menu-row:focus-visible{outline:2px solid var(--green);outline-offset:-2px}

/* ---------- bottom nav ---------- */
nav{
  position:fixed;bottom:0;left:0;right:0;z-index:40;
  background:var(--nav-bg);
  -webkit-backdrop-filter:blur(14px);backdrop-filter:blur(14px);
  border-top:1px solid var(--line);
  padding-bottom:env(safe-area-inset-bottom);
}
nav .in{max-width:520px;margin:0 auto;display:grid;grid-template-columns:repeat(4,1fr)}
nav button{position:relative;display:flex;flex-direction:column;align-items:center;gap:4px;padding:10px 0 8px;min-height:54px;color:var(--faint);font-size:10.5px;font-weight:700;letter-spacing:.02em;transition:color .15s}
nav button::before{content:"";position:absolute;top:-1px;left:50%;transform:translateX(-50%);width:0;height:3px;border-radius:0 0 3px 3px;background:var(--green);transition:width .18s}
nav button.on{color:var(--green);font-weight:800}
nav button.on::before{width:24px}
nav button:focus-visible{outline:2px solid var(--green);outline-offset:-2px;border-radius:8px}

/* ---------- sheet ---------- */
#sheetWrap{position:fixed;inset:0;z-index:60;display:none}
#sheetWrap.open{display:block}
#sheetWrap .bk{position:absolute;inset:0;background:rgba(7,17,11,.52);-webkit-backdrop-filter:blur(3px);backdrop-filter:blur(3px)}
#sheet{
  position:absolute;left:0;right:0;bottom:0;max-height:88vh;overflow-y:auto;
  background:var(--surface);border-radius:24px 24px 0 0;
  border:1px solid var(--line);border-bottom:none;
  max-width:520px;margin:0 auto;
  box-shadow:0 -20px 50px -22px rgba(0,0,0,.4);
  padding:10px 18px calc(20px + env(safe-area-inset-bottom));
  animation:up .24s cubic-bezier(.22,1,.36,1);
}
@keyframes up{from{transform:translateY(46px);opacity:.35}to{transform:none;opacity:1}}
@media (prefers-reduced-motion:reduce){#sheet{animation:none}}
#sheet .grab{width:40px;height:4.5px;border-radius:3px;background:var(--line);margin:4px auto 14px}
#sheet h3.sh{font-size:17px;font-weight:800;margin-bottom:4px;letter-spacing:-.02em}
.btnrow{display:flex;gap:10px;margin-top:20px}
.btn{flex:1;border-radius:14px;padding:13px;min-height:48px;font-size:14.5px;font-weight:800;text-align:center}
.btn.pri{background:linear-gradient(180deg,var(--green) 0%,var(--green-deep) 150%);color:var(--green-ink);box-shadow:0 8px 18px -9px rgba(15,74,46,.55)}
.btn.ghost{background:var(--surface2);border:1px solid var(--line);color:var(--muted)}
.btn.danger{background:var(--flag-soft);color:var(--flag)}
.btn:focus-visible{outline:2px solid var(--green);outline-offset:2px}
.formrow2{display:grid;grid-template-columns:1fr 1fr;gap:10px}

/* rsvp chips in event sheet */
.rsvp-mem{display:flex;align-items:center;gap:10px;padding:8px 0;border-top:1px solid var(--line2)}
.rsvp-mem:first-child{border-top:none}
.rsvp-mem .n{flex:1;font-weight:700;font-size:14px}
.tri{display:flex;gap:5px}
.tri button{font-size:12px;font-weight:800;min-height:40px;padding:8px 12px;border-radius:11px;background:var(--surface2);border:1px solid var(--line);color:var(--faint)}
.tri button:focus-visible{outline:2px solid var(--green);outline-offset:1px}
.tri button.on.y{background:var(--green);border-color:var(--green);color:var(--green-ink);box-shadow:0 4px 10px -5px rgba(15,74,46,.6)}
.tri button.on.m{background:var(--maybe-soft);border-color:var(--maybe);color:var(--maybe)}
.tri button.on.n{background:var(--flag-soft);border-color:var(--flag);color:var(--flag)}
.mini{font-size:11px;font-weight:800;min-height:36px;padding:6px 9px;border-radius:10px;background:var(--surface2);border:1px solid var(--line);color:var(--faint);flex:none}
.mini:focus-visible{outline:2px solid var(--green);outline-offset:1px}
.mini.on-r{background:var(--flag-soft);border-color:var(--flag);color:var(--flag)}
.mini.on-g{background:var(--gold-soft);border-color:var(--gold);color:var(--gold)}
.score-row{display:flex;align-items:center;gap:8px;padding:7px 0;border-top:1px solid var(--line2)}
.score-row:first-child{border-top:none}
.score-row .n{flex:1;font-weight:700;font-size:14px}
.score-row input{width:86px;text-align:center;padding:8px;min-height:40px}
.rank-row{display:flex;align-items:center;gap:10px;padding:9px 0;border-top:1px solid var(--line2)}
.rank-row .rk{width:28px;height:28px;border-radius:50%;display:flex;align-items:center;justify-content:center;font-size:12px;font-weight:900;background:var(--surface2);color:var(--muted);flex:none;box-shadow:inset 0 0 0 1px var(--line2)}
.rank-row:first-child .rk{background:var(--gold-soft);color:var(--gold);box-shadow:inset 0 0 0 1px var(--gold-hi)}
.rank-row .n{flex:1;font-weight:700;font-size:14px}
.rank-row .s{font-weight:900;font-size:15px;letter-spacing:-.02em}

/* ---------- lock (암호 잠금) ---------- */
#lockWrap{position:fixed;inset:0;z-index:100;display:flex;align-items:center;justify-content:center;
  background:linear-gradient(158deg,var(--hero-a) 0%,var(--hero-b) 55%,var(--hero-c) 100%)}
#lockWrap.off{display:none}
.lock-card{width:min(320px,86vw);text-align:center;color:#fff;padding-bottom:env(safe-area-inset-bottom)}
.lock-mark{width:58px;height:58px;border-radius:17px;background:rgba(255,255,255,.13);display:flex;align-items:center;justify-content:center;margin:0 auto 16px;box-shadow:inset 0 0 0 1px rgba(255,255,255,.28)}
.lock-eyebrow{font-size:10.5px;letter-spacing:.26em;font-weight:800;opacity:.65}
.lock-title{font-size:23px;font-weight:900;letter-spacing:-.02em;margin:4px 0 5px}
.lock-sub{font-size:13px;opacity:.78;margin-bottom:24px}
.lock-dots{display:flex;gap:15px;justify-content:center;margin-bottom:28px}
.lock-dots i{width:14px;height:14px;border-radius:50%;border:2px solid rgba(255,255,255,.45);transition:background .12s}
.lock-dots i.f{background:var(--gold-hi);border-color:var(--gold-hi)}
.lock-pad{display:grid;grid-template-columns:repeat(3,1fr);gap:10px}
.lock-pad button{height:56px;border-radius:14px;background:rgba(255,255,255,.1);color:#fff;font-size:21px;font-weight:700;box-shadow:inset 0 0 0 1px rgba(255,255,255,.14)}
.lock-pad button:active{background:rgba(255,255,255,.26)}
.lock-pad button:focus-visible{outline:2px solid var(--gold-hi);outline-offset:2px}
.lock-pad button.blank{background:none;box-shadow:none;pointer-events:none}
.lock-err{font-size:12.5px;color:#FFD9CF;height:18px;margin-top:15px;font-weight:700}
@keyframes lockshake{0%,100%{transform:none}25%{transform:translateX(-8px)}75%{transform:translateX(8px)}}
.lock-dots.shake{animation:lockshake .32s}
@media (prefers-reduced-motion:reduce){.lock-dots.shake{animation:none}}

/* toast */
#toast{
  position:fixed;left:50%;bottom:calc(96px + env(safe-area-inset-bottom));transform:translateX(-50%);
  background:var(--ink);color:var(--bg);font-size:13px;font-weight:700;
  padding:10px 18px;border-radius:999px;z-index:80;opacity:0;pointer-events:none;transition:opacity .2s;
  box-shadow:0 10px 26px -10px rgba(0,0,0,.45);
  max-width:86%;text-align:center;
}
#toast.on{opacity:1}
.hint{font-size:12px;color:var(--faint);line-height:1.6;margin-top:8px}

@media (prefers-reduced-motion:reduce){
  *,*::before,*::after{transition-duration:.01ms!important;animation-duration:.01ms!important}
}
</style>

function pinHash(p){let h=7;for(const c of String(p)+'|bmb')h=(h*131+c.charCodeAt(0))>>>0;return h.toString(36);}

function pinRender(){[...document.querySelectorAll('#lockDots i')].forEach((d,i)=>d.classList.toggle('f',i<pinBuf.length));}

function pinPress(k){
  const errEl=document.getElementById('lockErr');errEl.textContent='';
  if(k==='del'){pinBuf=pinBuf.slice(0,-1);pinRender();return;}
  if(pinBuf.length>=4)return;
  pinBuf+=k;pinRender();
  if(pinBuf.length===4){
    if(pinBuf===APP_PIN){
      try{localStorage.setItem('bmb.auth',pinHash(APP_PIN));}catch(e){}
      setTimeout(unlockApp,150);
    }else{
      const dots=document.getElementById('lockDots');
      dots.classList.add('shake');
      errEl.textContent='암호가 올바르지 않습니다';
      setTimeout(()=>{dots.classList.remove('shake');pinBuf='';pinRender();},380);
    }
  }
}

/* ================= 실시간 동기화 (Firebase RTDB REST/SSE) ================= */
let syncState=SYNC_URL?'connecting':'off'; /* off | connecting | on | error */
let applyingRemote=false,pushTimer=null;
function syncLabel(){return {off:'미설정 · 이 기기에만 저장',connecting:'연결 중…',on:'실시간 공유 연결됨',error:'연결 끊김 · 재시도 중'}[syncState];}
function syncPush(){
  if(!SYNC_URL||applyingRemote)return;
  clearTimeout(pushTimer);
  pushTimer=setTimeout(async()=>{
    try{
      const r=await fetch(SYNC_URL,{method:'PUT',body:JSON.stringify(S)});

/* ----- 새 소식: 지난 접속 이후 변경 요약 + 실시간 변경 토스트 ----- */
let newsItems=[],bootDiffDone=false;
/* Firebase는 키를 알파벳순으로 재정렬해 반환하므로 순서 무관 비교가 필요 */
function stableStr(x){
  if(x===null||typeof x!=='object')return JSON.stringify(x);
  if(Array.isArray(x))return '['+x.map(stableStr).join(',')+']';
  return '{'+Object.keys(x).sort().map(k=>JSON.stringify(k)+':'+stableStr(x[k])).join(',')+'}';
}
function diffSummary(a,b){
  const out=[];
  try{
    const aN=new Set((a.notices||[]).map(n=>n.id));
    const nn=(b.notices||[]).filter(n=>!aN.has(n.id)).length;
    if(nn)out.push(`새 공지 ${nn}건`);
    const aEv={};(a.events||[]).forEach(e=>aEv[e.id]=e);
    let newEv=0,chEv=0,rsvpCh=0,recCh=0;
    (b.events||[]).forEach(e=>{
      const o=aEv[e.id];
      if(!o){newEv++;return;}
      if(o.title!==e.title||o.date!==e.date||o.time!==e.time||o.place!==e.place||o.memo!==e.memo)chEv++;
      const or=o.rsvp||{},nr=e.rsvp||{};
      if(stableStr(or)!==stableStr(nr)){
        let c=0;new Set([...Object.keys(or),...Object.keys(nr)]).forEach(k=>{if(or[k]!==nr[k])c++;});
        rsvpCh+=c;
      }
      if(stableStr(o.scores||{})!==stableStr(e.scores||{})
        ||stableStr(o.noshow||{})!==stableStr(e.noshow||{})
        ||stableStr(o.hio||{})!==stableStr(e.hio||{}))recCh++;
    });
    if(newEv)out.push(`새 일정 ${newEv}건`);
    if(chEv)out.push(`일정 변경 ${chEv}건`);
    if(rsvpCh)out.push(`참석 체크 ${rsvpCh}건`);
    if(recCh)out.push(`스코어·기록 변경 ${recCh}건`);
    const aM={};(a.members||[]).forEach(m=>aM[m.id]=m);
    let newM=0,chM=0;
    (b.members||[]).forEach(m=>{const o=aM[m.id];if(!o){newM++;return;}if(stableStr(o)!==stableStr(m))chM++;});
    if(newM)out.push(`새 멤버 ${newM}명`);
    if(chM)out.push(`멤버 정보 수정 ${chM}건`);
    if(stableStr(a.fees||{})!==stableStr(b.fees||{}))out.push('회비 현황 변경');
    if(a.rulesUpdated!==b.rulesUpdated)out.push('회칙 개정');
    if(stableStr(a.club||{})!==stableStr(b.club||{}))out.push('모임 정보 변경');
  }catch(e){}
  return out;
}
function clearNews(){newsItems=[];renderHome();}
function applyRemote(remote){
  if(!remote||!remote.members)return;
  if(stableStr(remote)===stableStr(S))return;
  const old=S;
  applyingRemote=true;
  S=remote;normalizeState();
  try{localStorage.setItem('bmb.v1',JSON.stringify(S));}catch(e){}
  applyingRemote=false;
  const diff=diffSummary(old,S);
  if(diff.length){
    if(bootDiffDone){
      diff.forEach(d=>{if(!newsItems.includes(d))newsItems.push(d);});
      toast('방금 변경됨: '+diff.slice(0,2).join(' · ')+(diff.length>2?' 외':''));
    }else{
      newsItems=diff;
    }
  }
  bootDiffDone=true;
  el('#clubName').textContent=S.club.name;
  if(!el('#sheetWrap').classList.contains('open'))rerenderCurrent();
}
async function syncRefetch(){
  try{const r=await fetch(SYNC_URL);if(r.ok){applyRemote(await r.json());syncState='on';}}
  catch(e){syncState='error';}
}
async function syncInit(){
  if(!SYNC_URL)return;
  try{
    const r=await fetch(SYNC_URL);
    if(r.ok){
      const remote=await r.json();
      if(remote&&remote.members){applyRemote(remote);}
      else{await fetch(SYNC_URL,{method:'PUT',body:JSON.stringify(S)});} /* 서버가 비어 있으면 최초 업로드 */
      syncState='on';
    }
  }catch(e){syncState='error';}
  bootDiffDone=true; /* 이후 수신 변경은 '방금 변경' 토스트로 처리 */
  try{
    const es=new EventSource(SYNC_URL);
    es.addEventListener('put',ev=>{
      try{
        const d=JSON.parse(ev.data);
        if(d&&d.path==='/'){if(d.data)applyRemote(d.data);}
        else syncRefetch();
      }catch(e){}
    });
    es.addEventListener('patch',()=>syncRefetch());
    es.onopen=()=>{syncState='on';};
    es.onerror=()=>{if(syncState==='on')syncState='error';};
  }catch(e){syncState='error';}
}

function secondWednesday(y,m){
  const firstDow=new Date(y,m-1,1).getDay();
  const d=1+((3-firstDow+7)%7)+7;
  return `${y}-${String(m).padStart(2,'0')}-${String(d).padStart(2,'0')}`;
}
function regularCandidates(n){
  const out=[];const now=new Date();
  let y=now.getFullYear(),m=now.getMonth()+1;
  while(out.length<n){
    const date=secondWednesday(y,m);
    const dup=S.events.some(e=>e.date&&((e.type==='screen'&&e.date.slice(0,7)===date.slice(0,7))||e.date===date));
    if(date>=todayStr()&&!dup)out.push({date,m,place:m%2===0?VENUE_EVEN:VENUE_ODD});
    m++;if(m>12){m=1;y++;}
    if(y>now.getFullYear()+2)break;
  }
  return out;
}

function setRsvp(eid,mid,val){
  const e=S.events.find(x=>x.id===eid);if(!e)return;
  e.rsvp=e.rsvp||{};
  e.rsvp[mid]=e.rsvp[mid]===val?'':val;if(!e.rsvp[mid])delete e.rsvp[mid];
  save();openEventDetail(eid);renderHome();
}
function setScore(eid,mid,val){
  const e=S.events.find(x=>x.id===eid);if(!e)return;
  e.scores=e.scores||{};
  if(val==='')delete e.scores[mid];else e.scores[mid]=Number(val);
  save();openEventDetail(eid);
}
function toggleNoshow(eid,mid){
  const e=S.events.find(x=>x.id===eid);if(!e)return;
  e.noshow=e.noshow||{};
  if(e.noshow[mid]){delete e.noshow[mid];}
  else{e.noshow[mid]=true;delete (e.scores||{})[mid];delete (e.hio||{})[mid];}
  save();openEventDetail(eid);
}
function toggleHio(eid,mid){
  const e=S.events.find(x=>x.id===eid);if(!e)return;
  e.hio=e.hio||{};
  if(e.hio[mid]){delete e.hio[mid];}else{e.hio[mid]=true;delete (e.noshow||{})[mid];}
  save();openEventDetail(eid);
}

}

function toggleQuarter(mid,q){
  const F=getFees(feeYear);
  const qs=F.paid[mid]||[];
  F.paid[mid]=qs.includes(q)?qs.filter(x=>x!==q):[...qs,q].sort();
  if(!F.paid[mid].length)delete F.paid[mid];
  save();renderFees();
}
function editFeeAmount(){
  const F=getFees(feeYear);
  const v=prompt(`${feeYear}년 연회비 금액(원)`,F.amount);
  if(v==null)return;
  const n=Number(String(v).replace(/[^0-9]/g,''));
  if(!n){toast('숫자로 입력해 주세요.');return;}
  F.amount=n;save();renderFees();
}
function openExpenseForm(){
  openSheet(`<h3 class="sh">지출 기록</h3>
    <label for="ex-d">날짜</label><input id="ex-d" type="date" value="${todayStr()}">
    <label for="ex-t">내용</label><input id="ex-t" placeholder="예) 현수막 제작">
    <label for="ex-a">금액 (원)</label><input id="ex-a" type="number" inputmode="numeric" placeholder="예) 50000">
    <div class="btnrow"><button class="btn ghost" onclick="closeSheet()">취소</button>
    <button class="btn pri" onclick="saveExpense()">기록</button></div>`);
}
function saveExpense(){
  const desc=el('#ex-t').value.trim(),amount=Number(el('#ex-a').value);
  if(!desc||!amount){toast('내용과 금액을 입력해 주세요.');return;}
  getFees(feeYear).expenses.push({id:uid(),date:el('#ex-d').value||todayStr(),desc,amount});
  save();closeSheet();renderFees();toast('지출을 기록했습니다.');
}
function delExpense(id){
  if(!confirm('이 지출 기록을 삭제할까요?'))return;
  const F=getFees(feeYear);F.expenses=F.expenses.filter(x=>x.id!==id);save();renderFees();
}
function copyFeeReport(){
  const F=getFees(feeYear);
  const regulars=S.members.filter(m=>m.mtype!=='게스트');
  const qAmt=F.amount/4;
  const totQ=regulars.reduce((s,m)=>s+((F.paid[m.id]||[]).length),0);
  const spent=F.expenses.reduce((s,x)=>s+Number(x.amount||0),0);
  const stat=m=>{const qs=F.paid[m.id]||[];return qs.length>=4?'완납':qs.length?qs.join('·')+'분기 납부':'미납';};
  const lines=[
    `[${S.club.name}] ${feeYear}년 회비 현황 (${todayStr()} 기준)`,
    `· 연회비 ${fmtWon(F.amount)} = 분기당 ${fmtWon(qAmt)} (정회원 기준)`,
    `· 수입: ${fmtWon(totQ*qAmt)} (분기 납부 ${totQ}건)`,
    ...regulars.map(m=>`  - ${m.name}: ${stat(m)}`),
    `· 지출: ${F.expenses.length}건 ${fmtWon(spent)}`,
    ...F.expenses.map(x=>`  - ${x.date} ${x.desc} ${fmtWon(x.amount)}`),
    `· 잔액: ${fmtWon(totQ*qAmt-spent)}`
  ];
  const txt=lines.join('\n');
  if(navigator.clipboard&&navigator.clipboard.writeText){
    navigator.clipboard.writeText(txt).then(()=>toast('내역을 복사했습니다. 카톡방에 붙여넣으세요.'),()=>toast('복사에 실패했습니다.'));
  }else{prompt('아래 내용을 복사하세요',txt);}
}

function openManito(){

    openSheet(`<h3 class="sh">마니또 뽑기</h3>
      <div class="draftband" style="margin-top:8px">진행 중인 뽑기 (${fmtDate(last.date)} · ${Object.keys(last.pairs).length}명)<br>폰을 돌려가며 <b>자기 이름만</b> 눌러 확인하세요.</div>
      <div style="display:grid;grid-template-columns:repeat(3,1fr);gap:8px;margin-top:10px">
        ${Object.keys(last.pairs).map(gid=>`<button class="btn ${last.revealed[gid]?'ghost':'pri'}" style="padding:11px 4px;font-size:13px" onclick="revealManito('${gid}')">${esc(memberName(gid))}${last.revealed[gid]?' ✓':''}</button>`).join('')}
      </div>
      <div class="hint">결과는 이 기기에만 저장됩니다. 송년회 자리에서 진행자 폰 하나로 돌려보는 방식을 권장합니다.</div>
      <div class="btnrow"><button class="btn danger" onclick="resetManito()">다시 뽑기</button><button class="btn pri" onclick="closeSheet()">닫기</button></div>`);
  }else{
    openSheet(`<h3 class="sh">마니또 뽑기</h3>
      <div class="hint" style="margin-top:2px">송년회 마니또 행사용 (회칙: 선물 1인당 3만~5만 원). 참가자를 고르고 뽑기를 실행하세요 — 자기 자신은 절대 걸리지 않습니다.</div>
      <div style="margin-top:8px">${S.members.map(m=>`<label style="display:flex;align-items:center;gap:9px;font-size:14px;font-weight:600;color:var(--ink);letter-spacing:0;margin:0;padding:8px 0;border-top:1px solid var(--line2)">
        <input type="checkbox" class="mnt-c" value="${m.id}" ${m.mtype!=='게스트'?'checked':''} style="width:auto">${esc(m.name)}</label>`).join('')}</div>
      <div class="btnrow"><button class="btn ghost" onclick="closeSheet()">취소</button><button class="btn pri" onclick="drawManito()">뽑기 실행</button></div>`);
  }
}
function drawManito(){
  const ids=[...document.querySelectorAll('.mnt-c:checked')].map(c=>c.value);
  if(ids.length<3){toast('3명 이상 선택해 주세요.');return;}
  let rec;
  do{
    rec=ids.slice();
    for(let i=rec.length-1;i>0;i--){const j=Math.floor(Math.random()*(i+1));[rec[i],rec[j]]=[rec[j],rec[i]];}
  }while(rec.some((r,i)=>r===ids[i]));
  const pairs={};ids.forEach((g,i)=>pairs[g]=rec[i]);
  S.manito={date:todayStr(),pairs,revealed:{}};
  save();openManito();
}
function revealManito(gid){
  const mn=S.manito;if(!mn)return;
  if(!confirm(`${memberName(gid)} 님 본인이 맞나요?\n다른 사람은 화면을 보지 마세요!`))return;
  alert(`🎁 ${memberName(gid)} 님이 선물할 상대는\n\n【 ${memberName(mn.pairs[gid])} 】\n\n비밀 유지! 확인 후 다음 사람에게 넘겨주세요.`);
  mn.revealed[gid]=true;save();openManito();
}
function resetManito(){
  if(!confirm('현재 뽑기 결과를 지우고 새로 뽑을까요?'))return;
  S.manito=null;save();openManito();
}

function openClubForm(){
  openSheet(`<h3 class="sh">모임 정보</h3>
    <label for="cf-n">모임명</label><input id="cf-n" value="${esc(S.club.name)}">

    <label for="cf-i">소개</label><textarea id="cf-i" placeholder="모임 한 줄 소개">${esc(S.club.intro)}</textarea>
    <div class="btnrow"><button class="btn ghost" onclick="closeSheet()">취소</button>
    <button class="btn pri" onclick="saveClub()">저장</button></div>`);
}
function saveClub(){
  const n=el('#cf-n').value.trim();if(!n){toast('모임명을 입력해 주세요.');return;}
  S.club={name:n,founded:el('#cf-f').value.trim(),intro:el('#cf-i').value.trim()};
  save();closeSheet();renderMore();el('#clubName').textContent=S.club.name;toast('저장했습니다.');
}
function exportData(){
  const payload={app:'bim-milbirdie',version:1,exportedAt:new Date().toISOString(),data:S};
  const blob=new Blob([JSON.stringify(payload,null,2)],{type:'application/json'});
  const a=document.createElement('a');
  a.href=URL.createObjectURL(blob);
  a.download=`${S.club.name}_백업_${todayStr()}.json`;
  a.click();setTimeout(()=>URL.revokeObjectURL(a.href),4000);
  toast('백업 파일을 내려받았습니다. 카톡 등으로 공유하세요.');
}
el('#importInput').onchange=ev=>{
  const f=ev.target.files[0];ev.target.value='';if(!f)return;
  const r=new FileReader();
  r.onload=()=>{
    try{
      const p=JSON.parse(r.result);
      const d=p&&p.app==='bim-milbirdie'&&p.data?p.data:null;
      if(!d||!Array.isArray(d.members)||!Array.isArray(d.events))throw 0;
      if(!confirm(`백업(${p.exportedAt?p.exportedAt.slice(0,10):'날짜 미상'}) 데이터로 교체할까요?\n멤버 ${d.members.length}명 · 일정 ${d.events.length}건\n\n현재 이 기기의 데이터는 사라집니다.`))return;
      S=Object.assign(freshState(),d);normalizeState();save();showTab('home');toast('복원했습니다.');
    }catch(e){toast('올바른 백업 파일이 아닙니다.');}
  };
  r.readAsText(f);
};
function resetAll(){
  if(!confirm('현재 데이터를 모두 지우고 공식 기본 데이터(회칙·멤버 16명·확정 일정)로 초기화할까요? 되돌릴 수 없습니다.'))return;
  if(!confirm('정말 초기화합니다. 백업 파일이 없다면 [취소] 후 먼저 백업하세요.'))return;
  S=freshState();save();showTab('home');toast('공식 기본 데이터로 초기화했습니다.');
}
